{{define "execution-plan-chart"}}
<div class="exec-pipeline" x-data="{ ep: {{.}} || {} }" x-effect="ep = {{.}} || {}" :class="{ 'exec-pipeline-has-meta': ep.workflowID }">
    <button type="button"
        class="exec-pipeline-meta exec-pipeline-meta-copy mono"
        x-show="ep.workflowID"
        x-data="executionPlanWorkflowIDChip(ep.workflowID)"
        x-effect="setWorkflowID(ep.workflowID)"
        :class="{ 'exec-pipeline-meta-copied': copyState.copied, 'exec-pipeline-meta-error': copyState.error }"
        :title="copyTitle()"
        :aria-label="copyAriaLabel()"
        @click.prevent="copyWorkflowID()">
        <span class="exec-pipeline-meta-label">id:</span>
        <span class="exec-pipeline-meta-placeholder">...</span>
        <span class="exec-pipeline-meta-value" x-text="workflowID"></span>
        <span class="exec-pipeline-meta-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </span>
    </button>
    <div class="exec-pipeline-row">
        <div class="ep-node ep-node-endpoint">
            <div class="ep-node-icon ep-node-icon-endpoint">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M4 21v-1a8 8 0 0 1 16 0v1"/></svg>
            </div>
            <span class="ep-node-label">Client</span>
        </div>

        <div class="ep-conn"></div>
        <div class="ep-node ep-node-feature ep-node-auth" :class="ep.authNodeClass">
            <div class="ep-node-icon">
                <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
            </div>
            <span class="ep-node-label">Auth</span>
            <span class="ep-node-sub" x-show="ep.authNodeSublabel" x-text="ep.authNodeSublabel"></span>
        </div>

        <div class="ep-conn" x-show="ep.showGuardrails"></div>
        <div class="ep-node ep-node-feature ep-node-guardrails" x-show="ep.showGuardrails">
            <div class="ep-node-icon">
                <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <span class="ep-node-label">Guardrails</span>
            <span class="ep-node-sub" x-show="ep.guardrailLabel" x-text="ep.guardrailLabel"></span>
        </div>

        <div class="ep-conn" x-show="ep.showCache" :class="ep.cacheConnClass"></div>
        <div class="ep-node ep-node-feature ep-node-cache" x-show="ep.showCache" :class="ep.cacheNodeClass">
            <div class="ep-node-icon">
                <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
            </div>
            <span class="ep-node-label">Cache</span>
            <span class="ep-node-badge" x-show="ep.cacheStatusLabel" x-text="ep.cacheStatusLabel"></span>
        </div>

        <div class="ep-conn" :class="ep.aiConnClass"></div>

        <div class="ep-node ep-node-ai" :class="ep.aiNodeClass">
            <span class="ep-node-label" x-text="ep.aiLabel"></span>
            <span class="ep-node-sub" x-show="ep.aiSublabel" x-text="ep.aiSublabel"></span>
        </div>

        <div class="ep-conn" :class="ep.responseConnClass"></div>
        <div class="ep-node ep-node-endpoint" :class="ep.responseNodeClass">
            <div class="ep-node-icon ep-node-icon-endpoint">
                <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            <span class="ep-node-label">Response</span>
        </div>
    </div>

    <div class="ep-async-section" x-show="ep.showAsync">
        <div class="ep-async-row">
            <div class="ep-node ep-node-feature ep-node-async ep-node-async-usage" x-show="ep.showUsage" :class="ep.usageNodeClass">
                <div class="ep-node-icon">
                    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                </div>
                <span class="ep-node-label">Usage</span>
            </div>
            <div class="ep-conn ep-conn-async" x-show="ep.showUsage && ep.showAudit"></div>
            <div class="ep-node ep-node-feature ep-node-async ep-node-async-audit" x-show="ep.showAudit" :class="ep.auditNodeClass">
                <div class="ep-node-icon">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                </div>
                <span class="ep-node-label">Audit Log</span>
            </div>
        </div>
        <div class="ep-async-turn"></div>
        <span class="ep-async-label">Async</span>
    </div>
</div>
{{end}}
